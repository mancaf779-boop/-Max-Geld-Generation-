<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:800px;height:800px;overflow:hidden;background:#0d1b2a;font-family:"Arial Black",Impact,sans-serif}
.stage{width:800px;height:800px;position:relative;
  background:radial-gradient(120% 120% at 30% 18%,#22355a,#0d1b2a 70%)}
.grid{position:absolute;inset:56px;border-radius:50%;opacity:.10;overflow:hidden;
  background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px);
  background-size:66px 66px}
.ring{position:absolute;inset:40px;border-radius:50%;border:10px solid #f2b632;
  box-shadow:0 0 0 3px rgba(230,57,70,.4), inset 0 0 70px rgba(0,0,0,.4)}
.wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.pin{filter:drop-shadow(0 18px 32px rgba(0,0,0,.55));margin-top:-30px}
.word{color:#fff;font-size:96px;line-height:.9;letter-spacing:.02em;text-transform:uppercase;
  text-shadow:4px 4px 0 #e63946,-3px -3px 0 #e63946}
.sub{color:#f2b632;font-family:Arial,sans-serif;font-weight:900;font-size:31px;letter-spacing:.24em;text-transform:uppercase;margin-top:10px}
</style></head><body>
<div class="stage">
  <div class="grid"></div>
  <div class="ring"></div>
  <div class="wrap">
    <svg class="pin" width="300" height="300" viewBox="0 0 24 24">
      <path d="M12 22s7-6.6 7-12A7 7 0 0 0 5 10c0 5.4 7 12 7 12z" fill="#e63946"/>
      <circle cx="12" cy="10" r="2.7" fill="#fff"/>
    </svg>
    <div class="word">Ganz<br>oben</div>
    <div class="sub">Lokal sichtbar</div>
  </div>
</div>
</body></html>
